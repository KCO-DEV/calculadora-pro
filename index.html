<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora da Elisa 💖</title>

  <link rel="stylesheet" href="style.css">

  <!-- fonte delicada -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="calculator" id="calculator">

  <div class="top-bar" id="dragArea">
    <span>🐱 Calculadora da Elisa 💕</span>
    <button id="themeToggle">🌙</button>
  </div>

  <div class="display" id="display">0</div>

  <div class="buttons">
    <button class="clear">C</button>
    <button>(</button>
    <button>)</button>
    <button class="op">÷</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="op">×</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="op">−</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="op">+</button>

    <button>0</button>
    <button>.</button>
    <button class="equal">=</button>
  </div>

  <div class="history">
    <h3>💗 Histórico</h3>
    <ul id="historyList"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
